<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TAK Cesium Map</title>
    <style>
      #cesiumContainer {
        width: 100%;
        height: 100vh;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      body {
        margin: 0;
        padding: 0;
        background: #000;
      }

      /* Filter Panel */
      #filterContainer {
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
        background: rgba(42, 42, 42, 0.8);
        padding: 10px;
        border-radius: 4px;
        display: flex;
        gap: 5px;
        border: 1px solid #444;
      }
      #filterInput {
        background: #111;
        color: white;
        border: 1px solid #555;
        padding: 5px;
        width: 250px;
        border-radius: 3px;
      }
      #affiliationFilter {
        background: #111;
        color: white;
        border: 1px solid #555;
        padding: 5px;
        border-radius: 3px;
        cursor: pointer;
      }
      #clearFilter,
      #resetView,
      #toggleTrails,
      #toggleUnitList,
      #showInfo {
        background: #444;
        color: white;
        border: 1px solid #555;
        padding: 5px 10px;
        cursor: pointer;
        border-radius: 3px;
      }
      #clearFilter:hover,
      #resetView:hover,
      #toggleTrails:hover,
      #toggleUnitList:hover,
      #showInfo:hover {
        background: #555;
      }

      /* Custom Layer Picker Button - Positioned to the left of native buttons */
      #toggleLayerPicker {
        position: absolute;
        top: 10px;
        right: 90px;
        z-index: 1000;
        width: 32px;
        height: 32px;
        background: #303336;
        border: 1px solid #444;
        border-radius: 4px;
        color: white;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #toggleLayerPicker:hover {
        background: #484b4e;
        border-color: #aef;
        box-shadow: 0 0 8px rgba(0, 138, 255, 0.6);
      }
      #toggleLayerPicker svg {
        width: 22px;
        height: 22px;
        fill: #edffff;
      }

      /* Custom Layer Picker Panel - Cesium Style */
      #layerPickerPanel {
        position: absolute;
        top: 47px;
        right: 90px;
        z-index: 1000;
        background: rgba(38, 38, 38, 0.95);
        padding: 0;
        border-radius: 5px;
        border: 1px solid #444;
        color: white;
        width: 320px;
        max-height: 85vh;
        overflow-y: auto;
        font-family: sans-serif;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
      }
      .layer-section-header {
        background: #222;
        padding: 8px 12px;
        font-weight: bold;
        font-size: 0.85em;
        text-transform: uppercase;
        border-bottom: 1px solid #444;
        margin-top: 0;
        color: #edffff;
      }
      .layer-category-title {
        padding: 10px 12px 5px;
        font-size: 0.7em;
        color: #888;
        font-weight: bold;
        text-transform: uppercase;
        border-bottom: 1px solid #333;
        grid-column: span 3;
        margin-bottom: 5px;
      }
      .layer-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 5px;
        padding: 5px;
      }
      .layer-item {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        cursor: pointer;
        padding: 5px;
        border-radius: 4px;
        transition: background 0.2s;
      }
      .layer-item:hover {
        background: rgba(255, 255, 255, 0.1);
      }
      .layer-item.active {
        background: rgba(0, 138, 255, 0.2);
        box-shadow: inset 0 0 5px #0af;
      }
      .layer-thumb {
        width: 80px;
        height: 80px;
        border-radius: 4px;
        margin-bottom: 5px;
        background-size: cover;
        background-position: center;
        border: 1px solid #555;
      }
      .layer-item.active .layer-thumb {
        border-color: #0af;
      }
      .layer-label {
        font-size: 0.7em;
        line-height: 1.2;
        word-wrap: break-word;
        max-width: 90px;
        color: #fff;
      }
      .layer-item input {
        display: none;
      }

      /* Info Modal Styles */
      #infoModal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        z-index: 2000;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: opacity 0.3s ease;
      }
      .modal-hidden {
        opacity: 0;
        pointer-events: none;
      }
      .hidden {
        display: none !important;
      }
      #infoModalContent {
        background: #222;
        padding: 30px;
        border-radius: 8px;
        border: 1px solid #444;
        width: 500px;
        max-width: 90%;
        max-height: 80%;
        overflow-y: auto;
        position: relative;
        box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
      }
      #closeInfo {
        position: absolute;
        top: 10px;
        right: 10px;
        background: transparent;
        border: none;
        color: #888;
        font-size: 24px;
        cursor: pointer;
      }
      #closeInfo:hover {
        color: white;
      }

      /* Unit List Panel */
      #unitListPanel {
        position: absolute;
        top: 60px;
        left: 10px;
        width: 300px;
        bottom: 30px;
        background: rgba(42, 42, 42, 0.9);
        color: white;
        z-index: 1000;
        border-radius: 4px;
        border: 1px solid #444;
        display: flex;
        flex-direction: column;
        transition: transform 0.3s ease;
        font-family: sans-serif;
      }
      #unitListPanel.hidden {
        transform: translateX(-320px);
      }
      #unitListHeader {
        padding: 15px;
        background: #222;
        font-weight: bold;
        border-bottom: 1px solid #444;
        border-radius: 4px 4px 0 0;
      }
      #unitListContent {
        flex: 1;
        overflow-y: auto;
        padding: 10px;
      }
      .unit-group {
        margin-bottom: 15px;
      }
      .unit-group-header,
      .affiliation-header {
        font-size: 0.9em;
        text-transform: uppercase;
        color: #aaa;
        margin-bottom: 5px;
        border-bottom: 1px solid #333;
        padding: 5px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: rgba(0, 0, 0, 0.2);
      }
      .unit-group-header::after,
      .affiliation-header::after {
        content: "▼";
        font-size: 0.8em;
      }
      .unit-group.collapsed .unit-group-content,
      .affiliation-group.collapsed .affiliation-content {
        display: none;
      }
      .unit-group.collapsed .unit-group-header::after,
      .affiliation-group.collapsed .affiliation-header::after {
        content: "▶";
      }
      .affiliation-group {
        margin-left: 10px;
        margin-bottom: 5px;
      }
      .affiliation-header {
        font-size: 0.75em;
        color: #888;
        background: transparent;
        border-bottom: 1px solid #222;
      }
      .unit-item {
        display: flex;
        align-items: center;
        padding: 4px 5px;
        cursor: pointer;
        border-radius: 3px;
        transition: background 0.2s;
      }
      .unit-item:hover {
        background: #555;
      }
      .unit-icon {
        width: 24px;
        height: 24px;
        margin-right: 10px;
        object-fit: contain;
      }
      .unit-name {
        font-size: 0.95em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .unit-emergency {
        color: #ff4444;
        font-weight: bold;
        margin-left: auto;
        font-size: 0.8em;
      }

      /* Cesium InfoBox Fixes */
      .cesium-infoBox {
        top: auto !important;
        bottom: 30px !important;
        right: 10px !important;
        left: auto !important;
        width: 350px !important;
        height: 33vh !important;
        max-height: 33vh !important;
        transition: border 0.3s ease;
        display: flex !important;
        flex-direction: column !important;
      }
      .cesium-infoBox-iframe {
        flex: 1 1 auto !important;
        height: 100% !important;
        width: 100% !important;
        border: none !important;
      }

      /* Emergency Blinking Animation */
      @keyframes emergency-blink {
        0% {
          border: 5px solid red;
          box-shadow: 0 0 20px red;
        }
        50% {
          border: 5px solid transparent;
          box-shadow: none;
        }
        100% {
          border: 5px solid red;
          box-shadow: 0 0 20px red;
        }
      }

      .emergency-active {
        animation: emergency-blink 0.8s infinite !important;
      }

      /* Branding Logo */
      #brandingLogo {
        position: absolute;
        z-index: 999;
        max-width: 200px;
        max-height: 100px;
        pointer-events: none;
      }
      .logo-top_left {
        top: 10px;
        left: 10px;
      }
      .logo-top_center {
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
      }
      .logo-top_right {
        top: 10px;
        right: 10px;
      }
      .logo-bottom_left {
        bottom: 10px;
        left: 10px;
      }
      .logo-bottom_center {
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
      }
      .logo-bottom_right {
        bottom: 10px;
        right: 10px;
      }

      /* Hide Cesium logo */
      .cesium-credit-logoContainer {
        display: none !important;
      }

      /* Leaflet-style attribution */
      .cesium-viewer-bottom {
        background: rgba(255, 255, 255, 0.8) !important;
        color: #333 !important;
        font-family: "Helvetica Neue", Arial, Helvetica, sans-serif !important;
        font-size: 13px !important;
        padding: 2px 8px !important;
        left: 0 !important;
        right: auto !important;
        bottom: 0 !important;
        width: auto !important;
        max-width: 50%;
        border-top-right-radius: 4px;
        z-index: 1000;
        box-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
        display: block !important;
      }
      .cesium-viewer-bottom a {
        color: #0078a8 !important;
        text-decoration: none !important;
        font-weight: bold !important;
        text-shadow: none !important;
      }
      .cesium-viewer-bottom a:hover {
        text-decoration: underline !important;
      }
      .cesium-credit-expand-link {
        display: inline-block !important;
        color: #0078a8 !important;
        text-decoration: underline !important;
        cursor: pointer !important;
        text-shadow: none !important;
      }
      .cesium-credit-textContainer {
        display: none !important; /* Hide direct text so the expand link is used */
      }
      .cesium-credit-logoContainer {
        display: none !important;
      }

      /* Move Cesium controls to top right, after layer picker */
      .cesium-viewer-fullscreenContainer {
        top: 10px !important;
        right: 10px !important;
        bottom: auto !important;
      }
      .cesium-viewer-toolbar {
        top: 10px !important;
        right: 50px !important; /* Space for fullscreen button */
      }

      /* Auth Overlay */
      #authOverlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000;
        z-index: 5000;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-family: sans-serif;
      }
      #authContent {
        background: #111;
        padding: 40px;
        border-radius: 8px;
        border: 1px solid #333;
        width: 350px;
        box-shadow: 0 0 50px rgba(0, 138, 255, 0.2);
        text-align: center;
      }
      #authContent input {
        display: block;
        width: 100%;
        box-sizing: border-box;
        margin-bottom: 15px;
        padding: 10px;
        background: #000;
        border: 1px solid #444;
        color: white;
        border-radius: 4px;
      }
      #authContent button {
        width: 100%;
        padding: 10px;
        background: #0078a8;
        border: none;
        color: white;
        font-weight: bold;
        cursor: pointer;
        border-radius: 4px;
      }
      #authContent button:hover {
        background: #008cc3;
      }
      #authMessage {
        margin-top: 15px;
        color: #ff4444;
        font-size: 0.9em;
      }

      /* Status Bar */
      #statusBar {
        position: absolute;
        bottom: 0;
        right: 0;
        z-index: 1000;
        background: rgba(0, 0, 0, 0.7);
        color: #aaa;
        font-family: sans-serif;
        font-size: 11px;
        padding: 2px 10px;
        display: flex;
        gap: 20px;
        border-top-left-radius: 4px;
        border: 1px solid #222;
      }
      #statusCert span {
        color: #fff;
        font-weight: bold;
      }
      .status-green {
        color: #0f0 !important;
      }
      .status-orange {
        color: #f90 !important;
      }
      .status-red {
        color: #f00 !important;
      }

      #statusConnection {
        color: #888;
      }
      .conn-online {
        color: #0f0 !important;
      }

      #statusActions {
        display: flex;
        gap: 5px;
      }
      #statusActions button {
        background: #333;
        border: 1px solid #444;
        color: #ccc;
        font-size: 10px;
        padding: 1px 5px;
        cursor: pointer;
        border-radius: 2px;
      }
      #statusActions button:hover {
        background: #444;
        color: #fff;
      }
      #authForget:hover {
        background: #600 !important;
      }
    </style>
  </head>
  <body>
    <div id="cesiumContainer"></div>

    <div id="filterContainer">
      <select id="affiliationFilter">
        <option value="all">All</option>
        <option value="f">Friendly</option>
        <option value="h">Hostile</option>
        <option value="s">Suspect</option>
        <option value="n">Neutral</option>
        <option value="u">Unknown</option>
      </select>
      <input type="text" id="filterInput" placeholder="..." />
      <button id="clearFilter"></button>
      <button id="resetView" title=""></button>
      <button id="toggleUnitList" title=""></button>
      <button id="showInfo" title="Information">ⓘ</button>
    </div>

    <!-- Custom Layer Picker Button -->
    <button id="toggleLayerPicker" title="Layers">
      <svg viewBox="0 0 32 32">
        <path
          d="M16 5.3125 L3.4375 11.59375 L16 17.875 L28.5625 11.59375 Z M3.4375 15.1875 L16 21.46875 L28.5625 15.1875 L28.5625 17.6875 L16 23.96875 L3.4375 17.6875 Z M3.4375 19.1875 L16 25.46875 L28.5625 19.1875 L28.5625 21.6875 L16 27.96875 L3.4375 21.6875 Z"
        />
      </svg>
    </button>

    <!-- Custom Layer Picker Panel -->
    <div id="layerPickerPanel" class="hidden">
      <div id="terrainSection">
        <div class="layer-section-header">Terrain</div>
        <div id="terrainGrid" class="layer-grid"></div>
      </div>
      <div class="layer-section-header">Base Maps</div>
      <div id="baseMapGrid" class="layer-grid"></div>
      <div class="layer-section-header">Overlays</div>
      <div id="overlayGrid" class="layer-grid"></div>
    </div>

    <div id="infoModal" class="modal-hidden">
      <div id="infoModalContent">
        <button id="closeInfo">×</button>
        <div id="infoBody"></div>
      </div>
    </div>

    <div id="unitListPanel" class="hidden">
      <div id="unitListHeader"></div>
      <div id="unitListContent"></div>
    </div>

    <img id="brandingLogo" class="hidden" alt="Branding" />

    <!-- Auth Overlay -->
    <div id="authOverlay">
      <div id="authContent">
        <h2 id="authTitle">TAK Login</h2>
        <div id="enrollmentForm" class="hidden">
          <p>Please enroll to access the TAK network.</p>
          <input
            type="text"
            id="enrollServer"
            placeholder="TAK Server (e.g. tak.example.com)"
            autofocus
          />
          <input type="text" id="enrollUser" placeholder="Username" />
          <input
            type="password"
            id="enrollPass"
            placeholder="TAK Server Password"
          />
          <button id="enrollButton">Enroll</button>
        </div>
        <div id="loginForm" class="hidden">
          <p>Authenticated access required.</p>
          <input type="text" id="loginUser" placeholder="Username" autofocus />
          <input type="password" id="loginPass" placeholder="Password" />
          <button id="loginButton">Login</button>
        </div>
        <div id="authMessage" class="error hidden"></div>
      </div>
    </div>

    <!-- Status Bar -->
    <div id="statusBar" class="hidden">
      <div id="statusZoom">Z-</div>
      <div id="statusCert">
        Cert: <span id="certCN"></span> (<span id="certExpiry"></span>)
      </div>
      <div id="statusConnection">Disconnected</div>
      <div id="statusActions">
        <button id="authLogout" title="Logout (keeps certs)">Logout</button>
        <button id="authForget" title="Forget enrollment (wipes certs)">
          Forget
        </button>
      </div>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
