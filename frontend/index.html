<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TAK Cesium Map</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #000;
        font-family: sans-serif;
        display: flex;
        height: 100vh;
        overflow: hidden;
      }

      #sidebar {
        width: 300px;
        height: 100vh;
        background: #2a2a2a;
        color: white;
        display: flex;
        flex-direction: column;
        border-right: 1px solid #444;
        transition: width 0.3s ease;
        z-index: 1001;
        flex-shrink: 0;
      }

      #sidebar.collapsed {
        width: 0;
        border-right: none;
        overflow: hidden;
      }

      #sidebarContent {
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 15px;
        overflow-y: auto;
        flex: 1;
        min-width: 270px;
      }

      #sidebar h3 {
        margin: 0 0 10px 0;
        font-size: 0.9em;
        text-transform: uppercase;
        color: #aaa;
        border-bottom: 1px solid #444;
        padding-bottom: 5px;
      }

      .sidebar-section {
        margin-bottom: 10px;
      }

      .sidebar-button-row {
        display: flex;
        gap: 10px;
      }

      #cesiumContainer {
        flex: 1;
        height: 100vh;
        position: relative;
      }

      #sidebarToggle {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 1002;
        background: #303336;
        color: white;
        border: 1px solid #444;
        border-radius: 4px;
        width: 32px;
        height: 32px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
      }
      #sidebarToggle:hover {
        background: #484b4e;
        border-color: #aef;
      }

      /* Form controls */
      #filterInput {
        background: #111;
        color: white;
        border: 1px solid #555;
        padding: 8px;
        width: 100%;
        box-sizing: border-box;
        border-radius: 4px;
        margin-bottom: 10px;
      }
      #affiliationFilter {
        background: #111;
        color: white;
        border: 1px solid #555;
        padding: 8px;
        width: 100%;
        border-radius: 4px;
        cursor: pointer;
        margin-bottom: 10px;
      }
      .btn {
        background: #444;
        color: white;
        border: 1px solid #555;
        padding: 8px 12px;
        cursor: pointer;
        border-radius: 4px;
        font-size: 0.9em;
        flex: 1;
      }
      .btn:hover {
        background: #555;
      }

      /* Custom Layer Picker Button */
      #toggleLayerPicker {
        position: absolute;
        top: 10px;
        right: 90px;
        z-index: 1000;
        width: 32px;
        height: 32px;
        background: #303336;
        border: 1px solid #444;
        border-radius: 4px;
        color: white;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #toggleLayerPicker:hover {
        background: #484b4e;
        border-color: #aef;
        box-shadow: 0 0 8px rgba(0, 138, 255, 0.6);
      }
      #toggleLayerPicker svg {
        width: 22px;
        height: 22px;
        fill: #edffff;
      }

      /* Layer Picker Panel */
      #layerPickerPanel {
        position: absolute;
        top: 47px;
        right: 90px;
        z-index: 1000;
        background: rgba(38, 38, 38, 0.95);
        border-radius: 5px;
        border: 1px solid #444;
        color: white;
        width: 320px;
        max-height: 85vh;
        overflow-y: auto;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
      }
      .layer-section-header {
        background: #222;
        padding: 8px 12px;
        font-weight: bold;
        font-size: 0.85em;
        text-transform: uppercase;
        border-bottom: 1px solid #444;
        color: #edffff;
      }
      .layer-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 5px;
        padding: 5px;
      }
      .layer-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        cursor: pointer;
        padding: 5px;
        border-radius: 4px;
      }
      .layer-item:hover { background: rgba(255, 255, 255, 0.1); }
      .layer-item.active { background: rgba(0, 138, 255, 0.2); box-shadow: inset 0 0 5px #0af; }
      .layer-thumb { width: 80px; height: 80px; border-radius: 4px; margin-bottom: 5px; border: 1px solid #555; background-size: cover; background-position: center; }
      .layer-label { font-size: 0.7em; color: #fff; }
      .layer-item input { display: none; }
      .layer-category-title {
        grid-column: 1 / -1;
        font-size: 0.8em;
        font-weight: bold;
        color: #aaa;
        padding: 8px 5px 2px 5px;
        border-bottom: 1px solid #333;
        margin-top: 5px;
        text-align: left;
      }

      /* Info Modal */
      #infoModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: 2000; display: flex; justify-content: center; align-items: center; transition: opacity 0.3s ease; }
      .modal-hidden { opacity: 0; pointer-events: none; }
      .hidden { display: none !important; }
      #infoModalContent { background: #222; padding: 30px; border-radius: 8px; border: 1px solid #444; width: 500px; max-width: 90%; max-height: 80%; overflow-y: auto; position: relative; }
      #closeInfo { position: absolute; top: 10px; right: 10px; background: transparent; border: none; color: #888; font-size: 24px; cursor: pointer; }

      /* Unit List */
      #unitListContent { flex: 1; overflow-y: auto; }
      .unit-group { margin-bottom: 15px; }
      .unit-group-header, .affiliation-header { font-size: 0.9em; text-transform: uppercase; color: #aaa; margin-bottom: 5px; border-bottom: 1px solid #333; padding: 5px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: rgba(0, 0, 0, 0.2); }
      .unit-group-header::after, .affiliation-header::after { content: "▼"; font-size: 0.8em; }
      .unit-group.collapsed .unit-group-content, .affiliation-group.collapsed .affiliation-content { display: none; }
      .unit-group.collapsed .unit-group-header::after, .affiliation-group.collapsed .affiliation-header::after { content: "▶"; }
      .affiliation-group { margin-left: 10px; margin-bottom: 5px; }
      .affiliation-header { font-size: 0.75em; color: #888; background: transparent; border-bottom: 1px solid #222; }
      .unit-item { display: flex; align-items: center; padding: 4px 5px; cursor: pointer; border-radius: 3px; }
      .unit-item:hover { background: #555; }
      .unit-icon { width: 24px; height: 24px; margin-right: 10px; object-fit: contain; }
      .unit-name { font-size: 0.95em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .unit-emergency { color: #ff4444; font-weight: bold; margin-left: auto; font-size: 0.8em; }

      /* Cesium Overrides */
      .cesium-infoBox { bottom: 30px !important; right: 10px !important; left: auto !important; width: 350px !important; height: 33vh !important; }
      .cesium-infoBox-iframe { height: calc(100% - 35px) !important; width: 100% !important; border: none !important; }
      .emergency-active { animation: emergency-blink 0.8s infinite !important; }
      @keyframes emergency-blink { 0% { border: 5px solid red; } 50% { border: 5px solid transparent; } 100% { border: 5px solid red; } }
      
      .cesium-viewer-bottom { 
        background: none !important; 
        left: 0 !important;
        right: auto !important;
        bottom: 0 !important;
        padding: 0 !important;
        width: auto !important;
      }
      .cesium-credit-logoContainer { display: none !important; }
      .cesium-widget-credits {
        background: rgba(0, 0, 0, 0.7) !important; 
        color: #aaa !important; 
        font-size: 10px !important; 
        padding: 2px 10px !important; 
        border-top-right-radius: 4px;
        border: 1px solid #222;
        border-left: none !important;
        border-bottom: none !important;
        display: inline-block !important;
        margin: 0 !important;
      }
      .cesium-widget-credits a { color: #4af !important; text-decoration: none; }
      .cesium-widget-credits a:hover { text-decoration: underline; }
      
      .cesium-viewer-fullscreenContainer { top: 10px !important; right: 10px !important; bottom: auto !important; }
      .cesium-viewer-toolbar { top: 10px !important; right: 50px !important; }

      /* Branding */
      #brandingLogo { position: absolute; z-index: 999; max-width: 200px; max-height: 100px; pointer-events: none; }
      .logo-top_left { top: 20px; left: 20px; }
      .logo-top_center { top: 20px; left: 50%; transform: translateX(-50%); }
      .logo-top_right { top: 20px; right: 20px; }
      .logo-bottom_left { bottom: 30px; left: 20px; }
      .logo-bottom_center { bottom: 30px; left: 50%; transform: translateX(-50%); }
      .logo-bottom_right { bottom: 30px; right: 20px; }

      /* Auth Overlay */
      #authOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; display: flex; justify-content: center; align-items: center; color: white; }
      #authContent { background: #111; padding: 40px; border-radius: 8px; border: 1px solid #333; width: 350px; text-align: center; }
      #authContent input { display: block; width: 100%; box-sizing: border-box; margin-bottom: 15px; padding: 10px; background: #000; border: 1px solid #444; color: white; border-radius: 4px; }
      #authContent button { width: 100%; padding: 10px; background: #0078a8; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 4px; }
      #authMessage { margin-top: 15px; color: #ff4444; }

      /* Overlay Style Modal */
      #overlayStyleModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: 2000; display: flex; justify-content: center; align-items: center; transition: opacity 0.3s ease; }
      #overlayStyleModalContent { background: #222; padding: 30px; border-radius: 8px; border: 1px solid #444; width: 350px; max-width: 90%; position: relative; color: white; text-align: left; }
      #closeOverlayStyle { position: absolute; top: 10px; right: 10px; background: transparent; border: none; color: #888; font-size: 24px; cursor: pointer; }
      #overlayStyleModalContent h3 { margin-top: 0; margin-bottom: 10px; color: #edffff; }
      #overlayStyleModalContent p { font-size: 0.8em; color: #aaa; margin-bottom: 20px; }

      /* Status Bar */
      #statusBar { position: absolute; bottom: 0; right: 0; z-index: 1000; background: rgba(0, 0, 0, 0.7); color: #aaa; font-size: 11px; padding: 2px 10px; display: flex; gap: 20px; border-top-left-radius: 4px; border: 1px solid #222; }
      #statusCert { color: #fff; font-weight: bold; }
      #statusCert span.status-green { color: #4caf50 !important; }
      #statusCert span.status-orange { color: #ff9800 !important; }
      #statusCert span.status-red { color: #f44336 !important; }
      #statusConnection { font-weight: bold; }
      .conn-online { color: #4caf50 !important; }
      #statusPulse { 
        width: 8px; 
        height: 8px; 
        background: #444; 
        border-radius: 50%; 
        align-self: center;
        transition: background 0.1s;
      }
      .pulse-active {
        background: #4caf50 !important;
        box-shadow: 0 0 5px #4caf50;
      }
      #zuluClock {
        font-weight: bold;
        color: #edffff;
      }
      #statusActions button { background: #333; border: 1px solid #444; color: #ccc; font-size: 10px; padding: 1px 5px; cursor: pointer; border-radius: 2px; }
      #statusActions button:hover { background: #444; }
      #authForget { color: #ff9800 !important; opacity: 0.8; }
      #authForget:hover { opacity: 1; }
      #contourSettings { padding: 5px 10px; background: rgba(0,0,0,0.3); border-top: 1px solid #444; display: flex; align-items: center; justify-content: space-between; margin-top: 5px; }
      #contourSettings button { background: #444; color: white; border: 1px solid #555; width: 24px; height: 24px; cursor: pointer; border-radius: 3px; display: flex; align-items: center; justify-content: center; }
    </style>
  </head>
  <body>
    <div id="sidebar" class="collapsed">
      <div id="sidebarContent">
        <div class="sidebar-section">
          <h3 id="sidebarHeaderView">View</h3>
          <div class="sidebar-button-row">
            <button id="resetView" class="btn">Reset View</button>
            <button id="showInfo" class="btn" title="Information">ⓘ Info</button>
          </div>
        </div>

        <div class="sidebar-section">
          <h3 id="sidebarHeaderFilter">Filter</h3>
          <input type="text" id="filterInput" placeholder="Filter..." />
          <select id="affiliationFilter">
            <option value="all">All</option>
            <option value="f">Friendly</option>
            <option value="h">Hostile</option>
            <option value="s">Suspect</option>
            <option value="n">Neutral</option>
            <option value="u">Unknown</option>
          </select>
          <button id="clearFilter" class="btn" style="width: 100%;">Clear Filter</button>
        </div>

        <div class="sidebar-section" style="display: flex; flex-direction: column; min-height: 0; max-height: 40%;">
          <h3 id="sidebarHeaderTracks">Active Tracks</h3>
          <div id="unitListContent" style="overflow-y: auto;"></div>
        </div>

        <div class="sidebar-section" style="display: flex; flex-direction: column; min-height: 0;">
          <h3 id="sidebarHeaderStaff">Staff Comments</h3>
          <div id="staffCommentsContent" style="overflow-y: auto;"></div>
        </div>
      </div>
    </div>

    <div id="cesiumContainer">
      <button id="sidebarToggle" title="Toggle Sidebar">☰</button>

      <!-- Custom Layer Picker Button -->
      <button id="toggleLayerPicker" title="Layers">
        <svg viewBox="0 0 32 32">
          <path d="M16 5.3125 L3.4375 11.59375 L16 17.875 L28.5625 11.59375 Z M3.4375 15.1875 L16 21.46875 L28.5625 15.1875 L28.5625 17.6875 L16 23.96875 L3.4375 17.6875 Z M3.4375 19.1875 L16 25.46875 L28.5625 19.1875 L28.5625 21.6875 L16 27.96875 L3.4375 21.6875 Z" />
        </svg>
      </button>

      <!-- Custom Layer Picker Panel -->
      <div id="layerPickerPanel" class="hidden">
        <div id="terrainSection">
          <div class="layer-section-header">Terrain</div>
          <div id="terrainGrid" class="layer-grid"></div>
        </div>
        <div class="layer-section-header">Base Maps</div>
        <div id="baseMapGrid" class="layer-grid"></div>
        <div class="layer-section-header">Overlays</div>
        <div id="overlayGrid" class="layer-grid"></div>
        <div id="analysisSection" class="hidden">
          <div class="layer-section-header">Analysis</div>
          <div id="analysisGrid" class="layer-grid"></div>
          <div id="contourSettings" class="hidden">
             <span style="font-size: 0.8em; color: #ccc;">Density</span>
             <div style="display: flex; align-items: center; gap: 5px;">
                <button id="contourDec">-</button>
                <span id="contourValue" style="font-size: 0.9em; color: cyan; width: 45px; text-align: center;">100m</span>
                <button id="contourInc">+</button>
             </div>
          </div>
        </div>
      </div>

      <div id="statusBar" class="hidden">
        <div id="statusCert">
          Cert: <span id="certCN"></span> (<span id="certExpiry"></span>)
        </div>
        <div id="statusConnection">Disconnected</div>
        <div id="statusPulse" title="Incoming Packets"></div>
        <div id="statusActions">
          <button id="authLogout">Logout</button>
          <button id="authForget">Forget</button>
        </div>
        <div id="zuluClock"></div>
      </div>
    </div>

    <div id="infoModal" class="modal-hidden">
      <div id="infoModalContent">
        <button id="closeInfo">×</button>
        <div id="infoBody"></div>
      </div>
    </div>

    <div id="overlayStyleModal" class="modal-hidden">
      <div id="overlayStyleModalContent">
        <button id="closeOverlayStyle">×</button>
        <h3>Overlay Styling</h3>
        <p>Set visual styles for file overlays.</p>
        <div style="margin-bottom: 15px;">
          <label for="overlayColor" style="display: block; margin-bottom: 5px; font-size: 0.9em;">Outline Color</label>
          <input type="color" id="overlayColor" value="#00ffff" style="width: 100%; height: 35px; border: none; padding: 0;">
        </div>
        <div style="margin-bottom: 15px;">
          <label style="display: block; margin-bottom: 5px; font-size: 0.9em;">Fill Color</label>
          <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
            <input type="color" id="overlayFillColor" value="#00ffff" style="flex-grow: 1; height: 35px; border: none; padding: 0;">
            <label for="overlayFillNone" style="font-size: 0.9em; white-space: nowrap;">None</label>
            <input type="checkbox" id="overlayFillNone" style="width: 18px; height: 18px; cursor: pointer;">
          </div>
          <label for="overlayTransparency" style="display: block; margin-bottom: 5px; font-size: 0.9em;">Fill Transparency (%)</label>
          <input type="range" id="overlayTransparency" min="0" max="100" value="50" step="1" style="width: 100%; -webkit-appearance: none; appearance: none; height: 8px; background: #555; border-radius: 5px; outline: none; transition: opacity .2s;">
        </div>
        <div style="margin-bottom: 20px;">
          <label for="overlayWidth" style="display: block; margin-bottom: 5px; font-size: 0.9em;">Outline Width</label>
          <input type="number" id="overlayWidth" value="2" min="0" max="10" step="1" style="width: 100%; padding: 8px; background: #333; border: 1px solid #555; color: white; border-radius: 4px;">
        </div>
        <button id="saveOverlayStyle" class="btn" style="width: 100%;">Save Styles</button>
      </div>
    </div>

    <img id="brandingLogo" class="hidden" alt="Branding" />

    <!-- Auth Overlay -->
    <div id="authOverlay">
      <div id="authContent">
        <h2 id="authTitle">TAK Login</h2>
        <div id="enrollmentForm" class="hidden">
          <p>Please enroll to access the TAK network.</p>
          <input type="text" id="enrollServer" placeholder="TAK Server" />
          <input type="text" id="enrollUser" placeholder="Username" />
          <input type="password" id="enrollPass" placeholder="Password" />
          <button id="enrollButton">Enroll</button>
        </div>
        <div id="loginForm" class="hidden">
          <p>Authenticated access required.</p>
          <input type="text" id="loginUser" placeholder="Username" />
          <input type="password" id="loginPass" placeholder="Password" />
          <button id="loginButton">Login</button>
        </div>
        <div id="authMessage" class="hidden"></div>
      </div>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
